# A generic, single-database configuration.

[alembic]
# path to migration scripts
script_location = migrations

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path path, system-wide, to search for modules.
# prepends to sys.path before running.
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# timezone =

# max length of characters to allow for slug
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow array encoding of list-like types
# during autogenerate
# encode_list = false

# set to 'true' to allow empty/non-empty string comparisons
# during autogenerate
# compare_type = false

# set to 'true' to allow column type changes during autogenerate
# compare_server_default = false

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
